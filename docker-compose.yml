version: "3.9"

services:
  api:
    build: .
    ports:
      - "8007:8007"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      LLM_BACKEND: ${LLM_BACKEND:-auto}
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8007 --reload

  web:
    image: node:20-alpine
    working_dir: /web
    ports:
      - "3007:3007"
    environment:
      API_BASE_URL: http://api:8007
    volumes:
      - ./web:/web
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    depends_on:
      - api
